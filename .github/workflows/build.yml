name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  LLVM_VERSION: 19.1.4
  SCCACHE_DIRECT: yes

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            cmake_args: -D CMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld
            line_continue: '\'

          - name: Windows
            runner: windows-latest
            cmake_args:
            line_continue: '`'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: llvm/llvm-project
        ref: llvmorg-${{ env.LLVM_VERSION }}
        path: third_party/llvm-project
        fetch-depth: 1

    - id: llvm-revision
      run: echo llvm_revision=$(git -C ${{ github.workspace }}/third_party/llvm-project rev-parse HEAD) >> ${GITHUB_ENV}

    - uses: hendrikmuhs/ccache-action@4cb35b2ff44ce57e1f5f5221e26bd8fefcfe41d0 # main as of 2024-01-21
      with:
        key: ${{ runner.os }}-${{ env.llvm_revision }}
        variant: sccache

    - name: Configure LLVM
      run: >
        cmake -B ${{ github.workspace }}/build/llvm-project                     ${{ matrix.line_continue }}
              -D LLVM_ENABLE_PROJECTS="llvm;clang"                              ${{ matrix.line_continue }}
              -D CMAKE_BUILD_TYPE=Release                                       ${{ matrix.line_continue }}
              -D CMAKE_C_COMPILER_LAUNCHER=sccache                              ${{ matrix.line_continue }}
              -D CMAKE_CXX_COMPILER_LAUNCHER=sccache                            ${{ matrix.line_continue }}
              -S ${{ github.workspace }}/third_party/llvm-project/llvm          ${{ matrix.line_continue }}
              -G Ninja

    - name: Build LLVM
      run: >
        cmake --build ${{ github.workspace }}/build/llvm-project                ${{ matrix.line_continue }}
              --config Release

    - if: runner.os == 'Windows'
      uses: compnerd/gha-setup-vsdevenv@v6
      with:
        components: "Microsoft.VisualStudio.Component.VC.Tools.x86.x64;Microsoft.VisualStudio.Workload.NativeDesktop"

    - name: Configure IDS
      run: |
        cmake -B ${{ github.workspace }}/build                                                          ${{ matrix.line_continue }}
              -D CMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}                                                 ${{ matrix.line_continue }}
              -D CMAKE_C_COMPILER=${{ github.workspace }}/build/llvm-project/bin/clang                  ${{ matrix.line_continue }}
              -D CMAKE_CXX_COMPILER=${{ github.workspace }}/build/llvm-project/bin/clang++              ${{ matrix.line_continue }}
              -D LLVM_DIR=${{ github.workspace }}/build/llvm-project/lib/cmake/llvm                     ${{ matrix.line_continue }}
              -D Clang_DIR=${{ github.workspace }}/build/llvm-project/lib/cmake/clang                   ${{ matrix.line_continue }}
              -D FILECHECK_EXECUTABLE=${{ github.workspace }}/build/llvm-project/bin/FileCheck          ${{ matrix.line_continue }}
              -D LIT_EXECUTABLE=${{ github.workspace }}/third_party/llvm-project/llvm/utils/lit/lit.py  ${{ matrix.line_continue }}
              ${{ matrix.cmake_args }}

    - name: Build IDS
      run: >
        cmake --build ${{ github.workspace }}/build                             ${{ matrix.line_continue }}
              --config ${{ env.BUILD_TYPE }}

    - name: Test
      run: >
        cmake --build ${{github.workspace}}/build                               ${{ matrix.line_continue }}
              --target check-ids
